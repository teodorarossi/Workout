<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Teodora">
<meta name="theme-color" content="#111111">
<title>Teodora · Workout</title>
<style>
:root{--r:#C8000A;--r2:#960007;--rb:#FFF2F3;--bl:#111111;--dk:#2C2C2C;--mid:#666;--lt:#999;--ln:#E0E0E0;--bg:#F8F8F8;--wh:#FFFFFF;--gr:#1A7F3C;--gb:#F0FAF4;--am:#B45309;--ab:#FFFBEB;--nh:68px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#111;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--dk);max-width:480px;margin:0 auto;height:100vh;overflow:hidden;position:relative}
#app{height:calc(100vh - var(--nh));overflow-y:auto;-webkit-overflow-scrolling:touch}
/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nh);background:var(--wh);border-top:2px solid var(--r);display:flex;z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,.1)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:8px 0;border-top:3px solid transparent}
.nb.on{background:var(--rb);border-top-color:var(--r)}
.nb .ni{font-size:18px}.nb .nl{font-size:9px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--lt)}
.nb.on .nl{color:var(--r);font-weight:700}
/* COMMON */
.ph{background:var(--bl);padding:20px 18px 14px;position:sticky;top:0;z-index:50}
.ph .lbl{font-size:11px;color:var(--lt);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.ph h1{font-size:22px;color:#fff;font-weight:700}
.pb{padding:12px 14px 20px}
.card{background:var(--wh);border-radius:12px;border:1.5px solid var(--ln);margin-bottom:8px;overflow:hidden}
.sl{font-size:10px;font-weight:700;color:var(--r);letter-spacing:.12em;text-transform:uppercase;padding:14px 0 6px;border-bottom:1px solid var(--r)33;margin-bottom:10px}
.chip{background:var(--rb);border:1px solid var(--r);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--r);font-weight:600;display:inline-block}
.btn{border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:.02em}
.btn-r{background:var(--r);color:#fff}.btn-bl{background:var(--bl);color:#fff}.btn-g{background:var(--gr);color:#fff}
/* PHASE TOGGLE */
.pt{display:flex;gap:8px;margin-top:12px}
.pb2{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid #444;background:transparent;color:#AAA;transition:all .15s}
.pb2.on{background:var(--r);border-color:var(--r);color:#fff}
/* EX CARDS */
.exh{width:100%;background:transparent;border:none;padding:14px 16px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px}
.exb2{width:38px;height:38px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-weight:800;font-size:13px}
.exi{flex:1;min-width:0}.exn{font-weight:700;font-size:15px;color:var(--bl)}.exm{font-size:11px;color:var(--lt);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp{background:var(--rb);border:1px solid var(--r);border-radius:6px;padding:4px 8px;color:var(--r);font-weight:700;font-size:13px;white-space:nowrap;flex-shrink:0}
.exbody{padding:0 16px 16px}
.svgw{background:var(--bg);border-radius:8px;padding:8px;margin-bottom:12px}
.ib{border-radius:8px;padding:10px 12px;margin-bottom:10px}
.ib .it{font-size:11px;font-weight:700;letter-spacing:.08em;margin-bottom:6px}
.ib p,.ib ol{font-size:14px;line-height:1.65}.ib ol{padding-left:20px}.ib li{margin-bottom:4px}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.pbox{background:var(--bl);border-radius:8px;padding:8px 6px;text-align:center}
.pbox .pl{font-size:9px;color:#AAA;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.pbox .pv{color:#fff;font-weight:700;font-size:14px}
.ytb{display:flex;align-items:center;gap:8px;background:#FF0000;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-bottom:10px;text-decoration:none;justify-content:center}
/* SLIDERS */
.sw{margin-bottom:22px}.slbl{font-weight:700;font-size:16px;color:var(--dk);margin-bottom:10px}
.emoj{font-size:42px;text-align:center;margin-bottom:10px;line-height:1}
input[type=range].esl{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;outline:none}
input[type=range].esl::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--r);cursor:pointer;border:3px solid #fff;box-shadow:0 2px 8px rgba(200,0,10,.4)}
.sh{display:flex;justify-content:space-between;font-size:11px;color:var(--lt);margin-top:4px}
/* TIMER */
#timer-ov{position:fixed;bottom:calc(var(--nh)+20px);left:50%;transform:translateX(-50%);background:var(--bl);border-radius:20px;padding:20px;display:none;flex-direction:column;align-items:center;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:190px}
#timer-ov.show{display:flex}
.tc{position:relative;width:110px;height:110px}.tc svg{transform:rotate(-90deg)}
.tc .tbg{fill:none;stroke:#333;stroke-width:8}.tc .tpg{fill:none;stroke:var(--r);stroke-width:8;stroke-linecap:round}
.tn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;color:#fff}
.tlbl{color:#AAA;font-size:12px;margin-top:10px;letter-spacing:.08em;text-transform:uppercase}
.tskip{background:transparent;border:1px solid #444;color:#AAA;border-radius:8px;padding:8px 24px;margin-top:12px;font-size:13px;cursor:pointer}
/* START ANIM */
#sa{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;background:var(--r);z-index:600;flex-direction:column;align-items:center;justify-content:center}
#sa.show{display:flex}
.sai{font-size:90px;animation:bIn .6s ease}.sat{color:#fff;font-size:38px;font-weight:900;margin-top:16px;letter-spacing:.02em;animation:bIn .6s ease .2s both}.sas{color:rgba(255,255,255,.75);font-size:16px;margin-top:8px;animation:bIn .6s ease .4s both}
@keyframes bIn{from{transform:scale(.3);opacity:0}60%{transform:scale(1.1)}to{transform:scale(1);opacity:1}}
@keyframes cFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
/* PR BANNER */
#prb{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#FFD700;color:var(--bl);border-radius:50px;padding:12px 24px;font-weight:800;font-size:15px;z-index:700;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(255,215,0,.5);white-space:nowrap}
#prb.show{display:flex;animation:sDown .4s ease}
@keyframes sDown{from{transform:translateX(-50%) translateY(-60px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
/* SESSION OVERLAY */
#sov{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;background:var(--bg);z-index:200;display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sov.show{display:flex}
.sovh{background:var(--bl);padding:14px 18px;position:sticky;top:0;z-index:50;flex-shrink:0}
.sovh-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.back-btn{background:transparent;border:1.5px solid #555;color:#AAA;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600}
.sovh-info{flex:1}.sovh-sub{font-size:11px;color:var(--lt);letter-spacing:.1em;text-transform:uppercase}.sovh-title{color:#fff;font-weight:700;font-size:17px}
.save-ind{font-size:11px;font-weight:600;color:#888;transition:opacity .4s}.save-ind.ok{color:#4ADE80}.save-pill{display:inline-flex;align-items:center;gap:5px;background:#1A2A1A;border:1px solid #4ADE80;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:#4ADE80;animation:pillIn .25s ease;white-space:nowrap}.save-pill.saving{background:#1A1A2A;border-color:#888;color:#888}@keyframes pillIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
/* TOD */
.tod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.todbtn{padding:16px 10px;border-radius:12px;border:2px solid var(--ln);background:var(--wh);cursor:pointer;text-align:center;transition:all .15s}
.todbtn .ti{font-size:32px;display:block;margin-bottom:6px}.todbtn .tl{font-size:12px;font-weight:600;color:var(--mid)}
.todbtn.sel{border-color:var(--r);background:var(--rb)}.todbtn.sel .tl{color:var(--r)}
/* SERIES ROW */
.sr-row{display:grid;grid-template-columns:50px 1fr 1fr 44px;gap:6px;align-items:center;margin-bottom:8px}
.srl{font-size:12px;font-weight:700;color:var(--mid);text-align:center}
.ni{position:relative}
.ni input{width:100%;border:1.5px solid var(--ln);border-radius:8px;padding:10px 22px 10px 8px;font-size:18px;font-weight:700;text-align:center;outline:none;background:var(--wh);-webkit-appearance:none;-moz-appearance:textfield;transition:border-color .15s}
.ni input::-webkit-inner-spin-button,.ni input::-webkit-outer-spin-button{-webkit-appearance:none}
.ni input:focus{border-color:var(--r)}.ni input.filled{border-color:var(--gr);background:var(--gb)}
.ni .nu{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--lt);pointer-events:none}
.sdb{width:40px;height:40px;border-radius:50%;border:2px solid var(--ln);background:var(--wh);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sdb.done{border-color:var(--gr);background:var(--gb)}
/* PROGRESS GRID */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sc{background:var(--wh);border:1.5px solid var(--ln);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s}
.sc.done{background:var(--gb);border-color:var(--gr)}.sc.curr{border-color:var(--r);box-shadow:0 0 0 2px var(--rb)}
.snum{width:34px;height:34px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;color:#fff;font-weight:800;font-size:15px}
.sc.done .snum{background:var(--gr)}.sdlbl{font-size:12px;font-weight:600;color:var(--dk)}.sc.done .sdlbl{color:var(--gr)}.sdate{font-size:10px;color:var(--lt);margin-top:2px}.sc.done .sdate{color:var(--gr)}
/* PAIN */
.yn{display:flex;gap:10px;margin-top:8px}
.ynb{flex:1;padding:14px;border-radius:10px;border:2px solid var(--ln);background:var(--wh);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.ynb.y{border-color:var(--r);background:var(--rb);color:var(--r)}.ynb.n{border-color:var(--gr);background:var(--gb);color:var(--gr)}
.pain-note{width:100%;border:1px solid var(--ln);border-radius:8px;padding:10px;font-size:14px;margin-top:10px;outline:none;display:none;font-family:inherit}
.pain-note.show{display:block}
/* NUTRITION */
.meal-card{background:var(--wh);border-radius:10px;border:1px solid var(--ln);padding:14px;margin-bottom:8px}
.mlbl{font-size:12px;font-weight:700;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.mta{width:100%;border:1px solid var(--ln);border-radius:8px;padding:10px;font-size:14px;outline:none;min-height:56px;resize:none;line-height:1.5;font-family:inherit}
.pbar{background:var(--ln);border-radius:4px;height:8px;overflow:hidden;margin:8px 0}
.pfill{background:var(--r);height:100%;border-radius:4px;transition:width .4s}.pfill.ok{background:var(--gr)}
.wg{font-size:26px;cursor:pointer;opacity:.25;transition:opacity .15s}.wg.on{opacity:1}
/* BODY TAB */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mb{background:var(--wh);border-radius:10px;border:1px solid var(--ln);padding:14px}
.mbl{font-size:11px;color:var(--mid);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.mbv{font-size:24px;font-weight:800;color:var(--bl)}.mbu{font-size:13px;color:var(--lt);font-weight:400}
/* PHOTO */
.pt2{display:flex;flex-direction:column;gap:12px}
.pi{background:var(--wh);border-radius:12px;border:1px solid var(--ln);overflow:hidden}
.pi img{width:100%;max-height:280px;object-fit:cover}
.pm{padding:10px 12px}.pd{font-size:12px;color:var(--lt)}.pc{font-size:14px;color:var(--dk);margin-top:4px;font-style:italic}
/* RECAP */
.rh{background:var(--bl);border-radius:16px;padding:24px;margin-bottom:16px;text-align:center}
.rt{color:#fff;font-size:20px;font-weight:800;margin-bottom:4px}.rs2{color:#AAA;font-size:13px}
.rsg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.rsb{background:#222;border-radius:10px;padding:12px 8px;text-align:center}
.rsb .rv{color:#fff;font-size:22px;font-weight:800}.rsb .rl{color:#888;font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.barchart-wrap{display:flex;gap:4px;align-items:flex-end;height:50px;margin-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-val{font-size:9px;color:var(--lt)}.bar-body{width:100%;border-radius:3px 3px 0 0;background:var(--rb);border:1px solid var(--r);min-height:4px}.bar-body.last{background:var(--r)}
/* WELLBEING */
.wb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.wb-label{font-size:12px;color:var(--mid);width:60px;flex-shrink:0}
.wb-bar{flex:1;height:8px;background:var(--ln);border-radius:4px;overflow:hidden}
.wb-fill{height:100%;border-radius:4px;background:var(--r)}.wb-val{font-size:12px;font-weight:700;color:var(--dk);width:28px;text-align:right}
/* STREAK */
.sbanner{background:linear-gradient(135deg,var(--bl) 0%,#2C1010 100%);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:12px}
.sfire{font-size:36px}.sinf{flex:1}.snum2{color:#fff;font-size:28px;font-weight:900;line-height:1}
.slbl2{color:#AAA;font-size:12px;margin-top:2px}.smsg{color:#EEE;font-size:13px;font-style:italic;margin-top:2px}
/* QUOTE */
.qc{background:var(--rb);border:1px solid var(--r);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.qt{font-size:15px;color:var(--dk);font-style:italic;line-height:1.6}.qd{font-size:11px;color:var(--r);font-weight:700;margin-top:8px;letter-spacing:.08em}
/* DYNAMIC MSG */
.dmsg{background:var(--wh);border-radius:12px;border:1.5px solid var(--ln);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.dmsg-icon{font-size:28px;flex-shrink:0}.dmsg-text{font-size:14px;color:var(--dk);line-height:1.5}
/* SESSION EX */
.sec{background:var(--wh);border-radius:12px;border:1.5px solid var(--ln);margin-bottom:10px;overflow:hidden}
.sec.open{border-color:var(--r)}.sech{width:100%;background:transparent;border:none;padding:12px 14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px}.secbody{padding:0 14px 14px}
/* PHOTO PROMPT */
.pp{background:var(--bl);border-radius:16px;padding:24px;text-align:center;margin:16px}
.pp h3{color:#fff;font-size:20px;font-weight:800;margin-bottom:8px}.pp p{color:#AAA;font-size:14px;margin-bottom:20px;line-height:1.6}
.pp-prev{width:100%;max-height:250px;object-fit:cover;border-radius:10px;margin-bottom:14px;display:none}.pp-prev.show{display:block}
/* DATE INPUT */
input[type=date]{background:#222;color:#fff;border:1px solid #444;border-radius:8px;padding:6px 10px;font-size:14px;outline:none;width:100%;color-scheme:dark}
/* SCROLLBAR */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#DDD;border-radius:3px}
/* CELEBRATION */
#cel{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;background:var(--bl);z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
#cel.show{display:flex}
.cel-ring{width:110px;height:110px;border-radius:50%;border:6px solid var(--r);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:celPop .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes celPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.cel-stat{background:#1A1A1A;border-radius:12px;padding:14px 10px;text-align:center}
.cel-val{font-size:26px;font-weight:900;color:#fff;line-height:1}
.cel-lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
/* COACH OVERLAY */
#cov{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;background:var(--bg);z-index:300;display:none;flex-direction:column}
#cov.show{display:flex}
.covh{background:var(--bl);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:2px solid var(--r)}
.coach-avatar{width:40px;height:40px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.coach-name{color:#fff;font-weight:800;font-size:16px;letter-spacing:.01em}.coach-sub{color:#888;font-size:11px;margin-top:1px}
.coach-msgs{flex:1;overflow-y:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg{max-width:88%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.65;word-wrap:break-word}
.msg.user{background:var(--r);color:#fff;border-radius:16px 16px 4px 16px;align-self:flex-end}
.msg.coach{background:var(--wh);border:1.5px solid var(--ln);color:var(--dk);border-radius:16px 16px 16px 4px;align-self:flex-start}
.msg.typing{background:var(--wh);border:1.5px solid var(--ln);align-self:flex-start;padding:14px 18px}
.typing-dots{display:flex;gap:5px;align-items:center}.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--lt);animation:tdot .9s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.quick-chips{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:8px;padding:10px 14px;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick-chips::-webkit-scrollbar{display:none}
.qchip{background:var(--wh);border:1.5px solid var(--r);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--r);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.qchip:active{background:var(--r);color:#fff}
.coach-bar{display:flex;gap:8px;padding:10px 14px 12px;border-top:1px solid var(--ln);background:var(--wh);flex-shrink:0}
#coach-input{flex:1;border:1.5px solid var(--ln);border-radius:20px;padding:10px 16px;font-size:14px;outline:none;font-family:inherit;resize:none;line-height:1.4;max-height:96px;overflow-y:auto}
#coach-input:focus{border-color:var(--r)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--r);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;transition:transform .1s}
.send-btn:active{transform:scale(.88)}
.msg strong{font-weight:700}.msg em{font-style:italic}
.coach-welcome{text-align:center;padding:20px 16px;color:var(--mid);font-size:13px;line-height:1.6}
.coach-welcome .cw-icon{font-size:52px;margin-bottom:10px}.coach-welcome h3{font-size:17px;font-weight:800;color:var(--bl);margin-bottom:6px}
</style>
</head>
<body>
<div id="sa"><div class="sai">💪</div><div class="sat">Let's Go!</div><div class="sas">Teodora — session started</div></div>
<div id="prb"><span>🏆</span><span id="prb-text">New Personal Record!</span></div>
<div id="cel">
  <div class="cel-ring"><span style="font-size:48px">✓</span></div>

function goTab(t){
  S.tab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('nb-'+t);if(nb)nb.classList.add('on');
  renderApp();
}
function renderApp(){
  const app=document.getElementById('app');
  switch(S.tab){
    case 'workout':   app.innerHTML=renderWorkout();break;
    case 'progress':  app.innerHTML=renderProgress();break;
    case 'nutrition': app.innerHTML=renderNutrition();break;
    case 'body':      app.innerHTML=renderBody();break;
    case 'recap':     app.innerHTML=renderRecap();break;
  }
}

/* ═══════════════ UTILS ═══════════════ */
function age(){const b=new Date('1999-06-08'),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;return a;}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return '';try{return new Date(d+'T12:00:00').toLocaleDateString('it-IT',{day:'numeric',month:'short'});}catch{return d;}}
function fmtDur(ms){if(!ms||ms<1000)return '--';const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);return `${m}m ${s}s`;}
function getQ(){const a=S.fase==='f1'?QUOTES_F1:QUOTES_F2;return a[Math.floor(Date.now()/86400000)%a.length];}
function getMsg(){
  const done=Object.values(DB.sessions).filter(s=>s.completed);
  if(!done.length)return{icon:'👋',text:'Welcome, Teodora! Ready to start your fitness journey?'};
  const last=done.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const days=Math.floor((Date.now()-new Date(last.date+'T12:00:00'))/(86400000));
  if(days===0)return{icon:'🌟',text:'Great session today! Rest well and recover.'};
  if(days===1)return{icon:'💪',text:'Rest day — your muscles are recovering. Back at it soon!'};
  if(days===2)return{icon:'⚡',text:'2 days since your last session — your muscles are ready!'};
  return{icon:'🔥',text:`It's been ${days} days — time to get back in the game!`};
}
function streak(){return Object.values(DB.sessions).filter(s=>s.completed).length;}
function skey(f,i){return `${f}_s${i}`;}
function getSess(f,i){return DB.sessions[skey(f,i)]||{};}
function getExList(){return S.fase==='f1'?EX_F1:EX_F2;}
function nextSess(){for(let i=1;i<=12;i++){const sd=getSess(S.fase,i);if(!sd.completed)return i;}return 12;}
function getPRMax(fase,exId,excludeIdx){
  let max=0;
  for(let i=1;i<=12;i++){
    if(i===excludeIdx)continue;
    const sd=DB.sessions[skey(fase,i)];if(!sd)continue;
    const e=sd.exercises?.[exId];if(!e)continue;
    for(let s=1;s<=4;s++){const k=parseFloat(e[`s${s}_kg`]);if(k>max)max=k;}
  }
  return max;
}
function isPR(fase,exId,kg,idx){return parseFloat(kg)>getPRMax(fase,exId,idx)&&parseFloat(kg)>0;}
function getPRMaxSec(fase,exId,excludeIdx){
  let max=0;
  for(let i=1;i<=12;i++){
    if(i===excludeIdx)continue;
    const sd=DB.sessions[skey(fase,i)];if(!sd)continue;
    const e=sd.exercises?.[exId];if(!e)continue;
    for(let s=1;s<=4;s++){const k=parseFloat(e[`s${s}_sec`]);if(k>max)max=k;}
  }
  return max;
}
function isPRSec(fase,exId,sec,idx){return parseFloat(sec)>getPRMaxSec(fase,exId,idx)&&parseFloat(sec)>0;}

/* ═══════════════ PROGRESS TAB ═══════════════ */
function renderProgress(){
  const curr=nextSess(),weeksOff=S.fase==='f1'?0:4;
  const exs=getExList();
  let h=`<div class="ph"><div class="lbl">Progress Tracker</div><h1>Your Sessions</h1>
    <div class="pt">
      <button class="pb2 ${S.fase==='f1'?'on':''}" onclick="setFase('f1')">Phase 1 · Wk 1–4</button>
      <button class="pb2 ${S.fase==='f2'?'on':''}" onclick="setFase('f2')">Phase 2 · Wk 5–8</button>
    </div></div>
  <div class="pb">`;

  // Phase summary strip
  const phaseDone=Array.from({length:12},(_,i)=>getSess(S.fase,i+1)).filter(s=>s.completed).length;
  const pct=Math.round((phaseDone/12)*100);
  h+=`<div style="background:var(--wh);border-radius:12px;border:1px solid var(--ln);padding:14px 16px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-weight:700;font-size:14px;color:var(--dk)">${S.fase==='f1'?'Phase 1':'Phase 2'} Progress</span>
      <span style="font-size:14px;font-weight:900;color:var(--r)">${phaseDone}/12</span>
    </div>
    <div style="background:var(--ln);border-radius:4px;height:8px;overflow:hidden">
      <div style="background:var(--r);height:100%;border-radius:4px;width:${pct}%;transition:width .4s"></div>
    </div>
    <div style="font-size:11px;color:var(--lt);margin-top:6px">${pct}% complete · ${12-phaseDone} sessions remaining</div>
  </div>`;

  // Tip for logging past sessions
  const anyFuture=Array.from({length:12},(_,i)=>getSess(S.fase,i+1)).some((s,i)=>!s.completed&&(i+1)!==curr);
  if(anyFuture){
    h+=`<div style="background:var(--ab);border:1px solid #FDE68A;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#92400E;line-height:1.5">
      <strong>Missed a session?</strong> Tap any session to log it retroactively — you can set the date manually.
    </div>`;
  }
  // Timeline
  for(let w=1;w<=4;w++){
    h+=`<div style="margin-bottom:6px">
      <div style="font-size:10px;font-weight:700;color:var(--lt);letter-spacing:.1em;text-transform:uppercase;padding:8px 2px 6px">WEEK ${w+weeksOff}</div>`;
    for(let d=1;d<=3;d++){
      const idx=(w-1)*3+d,sd=getSess(S.fase,idx),done=sd.completed,isCurr=idx===curr&&!done;
      // Compute session stats if done
      let vol=0,prCount=0,exDone=0;
      if(done&&sd.exercises){
        for(const ex of exs){
          const e=sd.exercises?.[ex.id];if(!e)continue;
          let hasData=false;
          for(let s=1;s<=4;s++){const kg=parseFloat(e[`s${s}_kg`])||0,rp=parseFloat(e[`s${s}_rip`])||0;if(kg&&rp){vol+=kg*rp;hasData=true;}}
          if(hasData)exDone++;
          for(let s=1;s<=4;s++){const kg=parseFloat(e[`s${s}_kg`]);if(kg&&isPR(S.fase,ex.id,kg,idx))prCount++;}
        }
      }
      const dotColor=done?'var(--gr)':isCurr?'var(--r)':'var(--ln)';
      const dotIcon=done?'✓':isCurr?'▶':'';
      h+=`<div onclick="openSession(${idx})" style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:${isCurr?'var(--rb)':done?'var(--gb)':'var(--wh)'};border-radius:12px;border:1.5px solid ${isCurr?'var(--r)':done?'var(--gr)':'var(--ln)'};margin-bottom:6px;cursor:pointer">
        <div style="width:36px;height:36px;border-radius:50%;background:${dotColor};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:${done?'16':'14'}px;flex-shrink:0">${done?dotIcon:`<span style="font-size:12px;font-weight:800;color:${isCurr?'var(--r)':'var(--lt)'}">${idx}</span>`}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            <span style="font-weight:700;font-size:14px;color:${done?'var(--gr)':isCurr?'var(--r)':'var(--dk)'}">Session ${idx}</span>
            ${isCurr?`<span style="font-size:10px;font-weight:700;color:var(--r);background:var(--rb);border:1px solid var(--r);border-radius:10px;padding:1px 7px">NEXT</span>`:''}
            ${!done&&!isCurr?`<span style="font-size:10px;font-weight:600;color:var(--lt);background:var(--bg);border:1px solid var(--ln);border-radius:10px;padding:1px 7px">log past</span>`:''}
            ${prCount>0?`<span style="font-size:10px;font-weight:700;color:#B8860B;background:#FFFBEB;border:1px solid #FFD700;border-radius:10px;padding:1px 7px">🏆 ${prCount} PR</span>`:''}
          </div>
          ${done?`<div style="font-size:11px;color:var(--gr)">
            ${fmtDate(sd.date)} · ${fmtDur(sd.duration)}${exDone>0?` · ${exDone}/${exs.length} exercises`:''} ${vol>0?`· ${Math.round(vol)} kg×reps`:''}
          </div>`:`<div style="font-size:11px;color:var(--lt)">${isCurr?'Tap to start ▶':'Log session ↗'}</div>`}
        </div>
        <span style="color:${done?'var(--gr)':isCurr?'var(--r)':'var(--lt)'};font-size:16px">→</span>
      </div>`;
    }
    h+=`</div>`;
  }
  h+=renderProgressCharts();
  h+=`</div>`;return h;
}
function renderProgressCharts(){
  const exs=getExList(),done=[];
  for(let i=1;i<=12;i++){const sd=DB.sessions[skey(S.fase,i)];if(sd?.completed)done.push({i,sd});}
  if(done.length<2)return '';
  let h=`<div class="sl">WEIGHT PROGRESSION</div>`;
  for(const ex of exs){
    const vals=done.map(({sd})=>{const e=sd.exercises?.[ex.id];if(!e)return null;let m=0;for(let s=1;s<=4;s++){const k=parseFloat(e[`s${s}_kg`]);if(k>m)m=k;}return m||null;}).filter(Boolean);
    if(vals.length<2)continue;
    const maxV=Math.max(...vals),diff=vals[vals.length-1]-vals[0];
    h+=`<div style="background:var(--wh);border-radius:10px;border:1px solid var(--ln);padding:10px 14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div><div style="font-weight:700;font-size:13px;color:var(--dk)">${ex.name}</div>
        <div style="font-size:12px;color:var(--mid)">${vals[0]}kg → ${vals[vals.length-1]}kg</div></div>
        ${diff>0?`<span class="chip" style="background:var(--gb);border-color:var(--gr);color:var(--gr)">+${diff.toFixed(1)}kg ↑</span>`:''}
      </div>
      <div class="barchart-wrap">${vals.map((v,i)=>{const hh=maxV>0?Math.round((v/maxV)*42)+4:4;return`<div class="bar-col"><div class="bar-val">${v}</div><div class="bar-body ${i===vals.length-1?'last':''}" style="height:${hh}px"></div></div>`;}).join('')}</div>
    </div>`;
  }
  h+=renderVolumeChart(exs,done);
  return h;
}

  renderSOV();document.getElementById('sov').classList.add('show');
}
function closeSession(){document.getElementById('sov').classList.remove('show');stopTimer();renderApp();}
function confirmCancel(){
  const sd=DB.sessions[S.sessKey]||{};
  if(sd.completed){
    // session already saved, just close
    closeSession();return;
  }
  // check if any data was entered
  const hasData = sd.date || sd.checkin || (sd.exercises && Object.keys(sd.exercises).length>0);
  if(hasData){
    if(confirm('Close this session? Your data entered so far will be saved.')){closeSession();}
  } else {
    closeSession();
  }
}

function showCelebration(fase,idx,sd){
  const exs=fase==='f1'?EX_F1:EX_F2;
  let vol=0;
  for(const ex of exs){
    const e=sd.exercises?.[ex.id];if(!e)continue;
    for(let s=1;s<=4;s++){const kg=parseFloat(e['s'+s+'_kg'])||0,rp=parseFloat(e['s'+s+'_rip'])||0;vol+=kg*rp;}
  }
  const prs=[];
  for(const ex of exs){
    const e=sd.exercises?.[ex.id];if(!e)continue;
    for(let s=1;s<=4;s++){const kg=parseFloat(e['s'+s+'_kg']);if(kg&&isPR(fase,ex.id,kg,idx))prs.push(ex.name);}
  }
  const totalDone=Object.values(DB.sessions).filter(s=>s?.completed).length;
  const isFirst=totalDone===1;
  const isPhaseComplete=Array.from({length:12},(_,i)=>DB.sessions[skey(fase,i+1)]).filter(s=>s?.completed).length===12;
  const titleEl=document.getElementById('cel-title');
  if(isFirst)titleEl.textContent='First session done!';
  else if(isPhaseComplete)titleEl.textContent='Phase complete!';
  else if(prs.length)titleEl.textContent='New personal record!';
  else titleEl.textContent='Session complete!';
  document.getElementById('cel-sub').textContent=fmtDate(sd.date)+' \u00b7 '+fmtDur(sd.duration);
  const statsEl=document.getElementById('cel-stats');
  statsEl.innerHTML='<div class="cel-stat"><div class="cel-val">'+fmtDur(sd.duration)+'</div><div class="cel-lbl">Duration</div></div>'
    +'<div class="cel-stat"><div class="cel-val">'+(Math.round(vol)||'—')+'</div><div class="cel-lbl">kg \u00d7 reps</div></div>'
    +'<div class="cel-stat"><div class="cel-val" style="color:'+(prs.length?'#FFD700':'#fff')+'">'+(prs.length||'—')+'</div><div class="cel-lbl">New PRs \ud83c\udfc6</div></div>';
  const prsEl=document.getElementById('cel-prs');
  if(prs.length){
    let prsHtml='<div style="background:#1A1000;border:1px solid #FFD700;border-radius:10px;padding:12px 16px">';
    prs.forEach(function(n){prsHtml+='<div style="font-size:13px;color:#FFD700;padding:2px 0">\ud83c\udfc6 '+n+'</div>';});
    prsHtml+='</div>';
    prsEl.innerHTML=prsHtml;
  }else{prsEl.innerHTML='';}
  const msgEl=document.getElementById('cel-msg');
  if(isFirst)msgEl.textContent='Every expert started exactly where you are today. The hardest part was showing up — and you did.';
  else if(prs.length)msgEl.textContent='A new personal record. That is not luck — it is the result of consistent effort.';
  else msgEl.textContent='Progress is not always visible, but it is always happening. See you next session.';
  document.getElementById('cel').classList.add('show');
  showConfetti();
}
function closeCelebration(){
  document.getElementById('cel').classList.remove('show');
  const allSess=Object.values(DB.sessions).filter(s=>s&&s.completed);

}

/* ═══════════════ TIMER ═══════════════ */
const CIRC=2*Math.PI*46;
function startTimer(secs){
  stopTimer();S.timerSecs=secs;S.timerDur=secs;S.timerOn=true;
  document.getElementById('timer-ov').classList.add('show');
  updTimerUI();
  S.timerItv=setInterval(()=>{S.timerSecs--;if(S.timerSecs<=0){stopTimer();beep();}else updTimerUI();},1000);
}
function updTimerUI(){
  const tn=document.getElementById('tn'),tpg=document.getElementById('tpg');
  if(tn)tn.textContent=S.timerSecs;
  if(tpg){const pct=S.timerSecs/S.timerDur,off=CIRC*(1-pct);tpg.style.strokeDasharray=CIRC;tpg.style.strokeDashoffset=off;}
}
function stopTimer(){clearInterval(S.timerItv);S.timerOn=false;S.timerSecs=0;const ov=document.getElementById('timer-ov');if(ov)ov.classList.remove('show');}
function skipTimer(){stopTimer();}
function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.6);o.start(c.currentTime);o.stop(c.currentTime+0.6);}catch(e){}}

function showConfetti(){
  const cols=['#C8000A','#FFD700','#FFFFFF','#FF6B6B','#4ECDC4','#FFA500'],c=document.createElement('div');
  c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:800';
  for(let i=0;i<60;i++){const p=document.createElement('div'),sz=Math.random()*8+4;
    p.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};left:${Math.random()*100}%;top:-10px;border-radius:${Math.random()>.5?'50%':'0'};animation:cFall ${Math.random()*2+1}s linear ${Math.random()*.8}s forwards`;

/* ═══════════════ PHOTO HANDLING ═══════════════ */
function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    compressImg(e.target.result,700).then(compressed=>{
      if(S.photoCallback==='session'){S.photoData=compressed;S.photoCallback=null;renderSOV();}
      else if(S.photoCallback==='standalone'){
        const d=document.getElementById('sp-date')?.value||today();
        const cap=document.getElementById('sp-caption')?.value||'';
        if(!DB.progressPhotos)DB.progressPhotos=[];
        DB.progressPhotos.push({date:d,sessionKey:'manual',dataUrl:compressed,caption:cap});
        triggerSave();S.photoCallback=null;renderApp();
      }
    });
  };
  reader.readAsDataURL(file);input.value='';
}
function triggerStandalonePhoto(){S.photoCallback='standalone';document.getElementById('photo-input').click();}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.sessions)throw new Error('Invalid');if(!confirm('Import? This replaces ALL current data.'))return;DB=d;saveDB();renderApp();alert('Imported!');}catch(err){alert('Import failed: '+err.message);}};
  reader.readAsText(file);input.value='';
}
function compressImg(dataUrl,maxW=700){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{const c=document.createElement('canvas'),sc=Math.min(1,maxW/img.width);c.width=img.width*sc;c.height=img.height*sc;c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',0.65));};
    img.src=dataUrl;
  });
}

/* ═══════════════ RECAP TAB ═══════════════ */
function renderRecap(){
  const all=[];
  for(const f of['f1','f2'])for(let i=1;i<=12;i++){const sd=DB.sessions[skey(f,i)];if(sd?.completed)all.push({f,i,sd,k:skey(f,i)});}
  all.sort((a,b)=>new Date(b.sd.date)-new Date(a.sd.date));
  if(!all.length)return`<div class="ph"><div class="lbl">Recap</div><h1>Sessions</h1></div>
    <div class="pb"><div style="text-align:center;padding:60px 20px">
      <div style="font-size:60px;margin-bottom:16px">📊</div>
      <p style="font-size:16px;color:var(--mid);line-height:1.6">Complete your first session to see your recap here.</p>
    </div></div>`;
  const n=Math.min(S.recapN,all.length);
  const lastN=all.slice(0,n);
  const totDur=lastN.reduce((a,s)=>a+(s.sd.duration||0),0);
  const prs=[];
  for(const{f,i,sd}of lastN){
    const exs=f==='f1'?EX_F1:EX_F2;
    for(const ex of exs){
      const e=sd.exercises?.[ex.id];if(!e)continue;
      if(ex.id==='06'){for(let s=1;s<=4;s++){const sec=parseFloat(e[`s${s}_sec`]);if(sec&&isPRSec(f,ex.id,sec,i))prs.push({name:ex.name,val:sec+'s',isTime:true});}}
      else{for(let s=1;s<=4;s++){const kg=parseFloat(e[`s${s}_kg`]);if(kg&&isPR(f,ex.id,kg,i))prs.push({name:ex.name,val:kg+' kg',isTime:false});}}
    }
  }
  const wb={};const wbk=['energy','sleep','stress','mood'];

  const fTodL=fTod?TOD.find(t=>t.id===fTod[0])?.label||fTod[0]:'—';
  const cF=lastN[0].f,q=cF==='f1'?QUOTES_F1[Math.floor(Date.now()/86400000)%QUOTES_F1.length]:QUOTES_F2[Math.floor(Date.now()/86400000)%QUOTES_F2.length];

    </div>

      <div class="rsg">

function renderRecapCharts(lastN){
  if(!lastN.length)return'';
  const exs=lastN[0].f==='f1'?EX_F1:EX_F2;let h='';
  for(const ex of exs){
    const isPlk=ex.id==='06';
    const vals=lastN.slice().reverse().map(({sd})=>{
      const e=sd.exercises?.[ex.id];if(!e)return null;
      if(isPlk){let m=0;for(let s=1;s<=4;s++){const k=parseFloat(e[`s${s}_sec`]);if(k>m)m=k;}return m||null;}
      else{let m=0;for(let s=1;s<=4;s++){const k=parseFloat(e[`s${s}_kg`]);if(k>m)m=k;}return m||null;}
    }).filter(v=>v!==null);
    if(!vals.length)continue;
    const maxV=Math.max(...vals),diff=vals.length>1?vals[vals.length-1]-vals[0]:0;
    const unit=isPlk?'s':'kg';
    h+=`<div style="background:var(--wh);border-radius:10px;border:1px solid var(--ln);padding:10px 14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:700;font-size:13px;color:var(--dk)">${ex.name}</span>
        ${diff>0?`<span class="chip" style="background:var(--gb);border-color:var(--gr);color:var(--gr)">+${isPlk?diff.toFixed(0):diff.toFixed(1)}${unit} ↑</span>`:''}
      </div>
      <div class="barchart-wrap">${vals.map((v,i)=>{const hh=maxV>0?Math.round((v/maxV)*42)+4:4;return`<div class="bar-col"><div class="bar-val">${v}${unit}</div><div class="bar-body ${i===vals.length-1?'last':''}" style="height:${hh}px"></div></div>`;}).join('')}</div>
    </div>`;
  }
  return h||'<p style="font-size:14px;color:var(--lt);padding:8px 0">No exercise data recorded yet.</p>';
}

function buildCoachContext(){

        const exList=f==='f1'?EX_F1:EX_F2;

          const ed=sd.exercises?.[ex.id];if(!ed)continue;
          const sets=[];for(let s=1;s<=4;s++){const kg=ed[`s${s}_kg`],reps=ed[`s${s}_rip`];if(kg||reps)sets.push(`${kg||'?'}kg×${reps||'?'}`);}

Programma attuale: ${currentPhase==='f1'?'Fase 1 (settimane 1-4, 3 serie, 12-15 reps)':'Fase 2 (settimane 5-8, 3-4 serie, 10-12 reps)'}

SESSIONI COMPLETATE (${completedSessions.length} totali, ultime 5 mostrate):
${completedSessions.slice(0,5).map(s=>`
[${s.fase} · Sessione ${s.numero} · ${s.data||'data?'} · ${s.durata}]
${s.checkin?`Checkin: Energia ${s.checkin.energy}/5 · Sonno ${s.checkin.sleep}/5 · Stress ${s.checkin.stress}/5 · Umore ${s.checkin.mood}/5${s.checkin.pain?' · ⚠ DOLORE: '+s.checkin.painNote:''}`:``}
${s.esercizi.map(e=>`  • ${e.nome}: ${e.serie}${e.note?' (nota: '+e.note+')':''}`).join('\n')}`).join('\n')}

PERSONAL RECORDS ATTUALI:
${Object.entries(prs).length?Object.entries(prs).map(([k,v])=>`  • ${k}: ${v} kg`).join('\n'):'Nessun PR registrato ancora.'}

METRICHE CORPOREE (ultima misurazione: ${lastBody?.date||'non ancora registrata'}):

WELLBEING MEDIO (ultime 6 sessioni):

NUTRIZIONE OGGI (${today()}):

function calcBest1RM(exId,ns){

/* ═══════════════ BODY CHART ═══════════════ */
function renderBodyChart(logs){
  if(!logs||logs.length<2)return'';
  const wLogs=logs.filter(l=>parseFloat(l.weight));
  const mLogs=logs.filter(l=>parseFloat(l.muscleMass));
  if(wLogs.length<2&&mLogs.length<2)return'';
  const W=280,H=100,pad=22;
  const allW=wLogs.map(l=>parseFloat(l.weight));
  const allM=mLogs.map(l=>parseFloat(l.muscleMass));
  const allVals=[...allW,...allM].filter(Boolean);
  if(!allVals.length)return'';
  const minV=Math.min(...allVals)-2,maxV=Math.max(...allVals)+2;
  const xS=(i,tot)=>pad+(i/(Math.max(tot-1,1)))*(W-pad*2);
  const yS=v=>H-pad-((v-minV)/(maxV-minV||1))*(H-pad*2);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">`;
  // Grid
  svg+=`<line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="var(--ln)" stroke-width="1"/>`;
  [0,.5,1].forEach(t=>{const y=H-pad-(t*(H-pad*2));svg+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--ln)" stroke-width=".5" stroke-dasharray="3,3"/>`;const v=(minV+t*(maxV-minV)).toFixed(1);svg+=`<text x="${pad-4}" y="${y+3}" text-anchor="end" font-size="8" fill="var(--lt)">${v}</text>`;});
  // Weight line (red)
  if(wLogs.length>=2){
    const pts=wLogs.map((l,i)=>`${xS(i,wLogs.length)},${yS(parseFloat(l.weight))}`).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="var(--r)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    wLogs.forEach((l,i)=>{const x=xS(i,wLogs.length),y=yS(parseFloat(l.weight));svg+=`<circle cx="${x}" cy="${y}" r="3.5" fill="var(--r)"/><text x="${x}" y="${y-6}" text-anchor="middle" font-size="8.5" fill="var(--r)" font-weight="700">${l.weight}</text>`;});
  }
  // Muscle line (green)
  if(mLogs.length>=2){
    const pts=mLogs.map((l,i)=>`${xS(i,mLogs.length)},${yS(parseFloat(l.muscleMass))}`).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="var(--gr)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,3"/>`;
    mLogs.forEach((l,i)=>{const x=xS(i,mLogs.length),y=yS(parseFloat(l.muscleMass));svg+=`<circle cx="${x}" cy="${y}" r="3" fill="var(--gr)"/>`;});
  }
  // Date labels
  const labLogs=wLogs.length>=mLogs.length?wLogs:mLogs;
  labLogs.forEach((l,i)=>{svg+=`<text x="${xS(i,labLogs.length)}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--lt)">${fmtDate(l.date)}</text>`;});
  svg+='</svg>';
  return`<div style="background:var(--wh);border-radius:10px;border:1px solid var(--ln);padding:10px 14px;margin-bottom:14px">
    <div style="display:flex;gap:14px;margin-bottom:8px;font-size:11px;font-weight:700">
      <span style="color:var(--r)">— Weight (kg)</span>
      ${mLogs.length>=2?`<span style="color:var(--gr)">- - Muscle (kg)</span>`:''}
    </div>
    ${svg}
  </div>`;
}

/* ═══════════════ VOLUME CHART ═══════════════ */
function renderVolumeChart(exs,done){
  if(done.length<2)return'';
  const vols=done.map(({i,sd})=>{
    let v=0;
    for(const ex of exs){const e=sd.exercises?.[ex.id];if(!e)continue;for(let s=1;s<=4;s++){const kg=parseFloat(e[`s${s}_kg`])||0,rp=parseFloat(e[`s${s}_rip`])||0;v+=kg*rp;}}
    return{i,v:Math.round(v),date:sd.date};
  }).filter(d=>d.v>0);
  if(vols.length<2)return'';
  const maxV=Math.max(...vols.map(d=>d.v));
  const diff=vols[vols.length-1].v-vols[0].v;
  return`<div style="background:var(--wh);border-radius:10px;border:1px solid var(--ln);padding:10px 14px;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div>
        <div style="font-weight:700;font-size:13px;color:var(--dk)">Total Training Volume</div>
        <div style="font-size:11px;color:var(--mid)">${vols[0].v} → ${vols[vols.length-1].v} kg×reps</div>
      </div>
      ${diff>0?`<span class="chip" style="background:var(--gb);border-color:var(--gr);color:var(--gr)">+${diff} ↑</span>`:''}
    </div>
    <div class="barchart-wrap">${vols.map((d,i)=>{const hh=maxV>0?Math.round((d.v/maxV)*42)+4:4;return`<div class="bar-col"><div class="bar-val" style="font-size:8px">${d.v}</div><div class="bar-body ${i===vols.length-1?'last':''}" style="height:${hh}px;background:${i===vols.length-1?'var(--r)':'var(--rb)'}"></div></div>`;}).join('')}
    </div>
  </div>`;
}

/* ═══════════════ PHOTO COMPARISON ═══════════════ */
function renderPhotoComparison(photos){
  if(photos.length<2)return'';
  const aIdx=S.cmpA??0, bIdx=S.cmpB??Math.min(1,photos.length-1);
  const photoA=photos[aIdx],photoB=photos[bIdx];
  return`<div style="background:var(--wh);border-radius:12px;border:1px solid var(--ln);padding:14px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:var(--dk);margin-bottom:10px">📸 Compare two photos</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div>
        <div style="font-size:11px;color:var(--mid);margin-bottom:4px;font-weight:600">BEFORE</div>
        <select onchange="S.cmpA=parseInt(this.value);renderApp()" style="width:100%;border:1px solid var(--ln);border-radius:6px;padding:5px;font-size:12px;background:var(--bg);color:var(--dk)">
          ${photos.map((p,i)=>`<option value="${i}" ${i===aIdx?'selected':''}>${fmtDate(p.date)}</option>`).join('')}
        </select>
      </div>
      <div>
        <div style="font-size:11px;color:var(--mid);margin-bottom:4px;font-weight:600">AFTER</div>
        <select onchange="S.cmpB=parseInt(this.value);renderApp()" style="width:100%;border:1px solid var(--ln);border-radius:6px;padding:5px;font-size:12px;background:var(--bg);color:var(--dk)">
          ${photos.map((p,i)=>`<option value="${i}" ${i===bIdx?'selected':''}>${fmtDate(p.date)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="border-radius:10px;overflow:hidden;border:2px solid var(--ln)">
        <img src="${photoA.dataUrl}" style="width:100%;max-height:220px;object-fit:cover;display:block">
        <div style="padding:6px 8px;font-size:10px;color:var(--lt);text-align:center">${fmtDate(photoA.date)}</div>
      </div>
      <div style="border-radius:10px;overflow:hidden;border:2px solid var(--r)">
        <img src="${photoB.dataUrl}" style="width:100%;max-height:220px;object-fit:cover;display:block">
        <div style="padding:6px 8px;font-size:10px;color:var(--r);font-weight:700;text-align:center">${fmtDate(photoB.date)}</div>
      </div>
    </div>
  </div>`;
}

/* ═══════════════ PWA ICON — weight plate ═══════════════ */
function setupPWA(){
  const c=document.createElement('canvas');c.width=c.height=192;const x=c.getContext('2d');
  // Background with rounded corners
  x.fillStyle='#111111';rrect(x,0,0,192,192,38);x.fill();
  const cx=96,cy=96;
  // Outer ring
  x.beginPath();x.arc(cx,cy,68,0,Math.PI*2);
  x.strokeStyle='#C8000A';x.lineWidth=20;x.stroke();
  // Inner ring
  x.beginPath();x.arc(cx,cy,22,0,Math.PI*2);
  x.strokeStyle='#C8000A';x.lineWidth=9;x.stroke();
  const iconUrl=c.toDataURL('image/png');
  const link=document.createElement('link');link.rel='apple-touch-icon';link.href=iconUrl;document.head.appendChild(link);
  try{const m={name:"Teodora · Workout",short_name:"Workout",start_url:".",display:"standalone",background_color:"#111111",theme_color:"#C8000A",icons:[{src:iconUrl,sizes:"192x192",type:"image/png"},{src:iconUrl,sizes:"512x512",type:"image/png"}]};const blob=new Blob([JSON.stringify(m)],{type:'application/json'});const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);}catch(e){}
}
function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

/* ═══════════════ INIT ═══════════════ */
setupPWA();
renderApp();
</script>
</body>
